<h2 class="sr-only">Claude用語翻訳アプリ。Claudeの発言を貼り付けると皮肉込みの本音翻訳を返します。</h2>
<div style="padding: 1rem 0;">
  <div style="margin-bottom: 1rem;">
    <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">Claudeの発言を貼ってください</label>
    <textarea id="src" rows="5" placeholder="例：正直に言うと、それは非常に興味深い観点ですね。" style="width: 100%; resize: vertical;"></textarea>
  </div>
  <div style="display: flex; gap: 8px; margin-bottom: 1rem;">
    <button id="go" style="flex: 1;"><i class="ti ti-language" aria-hidden="true" style="font-size:16px; vertical-align:-2px; margin-right:6px"></i>本音に翻訳</button>
    <button id="clr" style="width: 80px;"><i class="ti ti-x" aria-hidden="true" style="font-size:16px; vertical-align:-2px;"></i></button>
  </div>
  <div id="out" style="display: none; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem;">
    <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">本音翻訳</div>
    <div id="out-body" style="font-size: 15px; line-height: 1.7; color: var(--color-text-primary); white-space: pre-wrap;"></div>
  </div>
  <div id="err" style="display: none; background: var(--color-background-danger); color: var(--color-text-danger); padding: 12px; border-radius: var(--border-radius-md); font-size: 13px; margin-top: 1rem;"></div>
</div>
<script>
const src = document.getElementById('src');
const go = document.getElementById('go');
const clr = document.getElementById('clr');
const out = document.getElementById('out');
const outBody = document.getElementById('out-body');
const err = document.getElementById('err');

clr.onclick = () => { src.value = ''; out.style.display = 'none'; err.style.display = 'none'; };

go.onclick = async () => {
  const text = src.value.trim();
  if (!text) return;
  err.style.display = 'none';
  out.style.display = 'block';
  outBody.textContent = '翻訳中…';
  go.disabled = true;

  const sys = `あなたはClaudeの発言を「皮肉込みの本音」に翻訳する翻訳機です。Claudeが使いがちな丁寧で慎重な言い回しの裏にある、もっと身も蓋もない本音を、軽い皮肉とユーモアを込めて訳してください。

ルール：
- 元の文の各フレーズに対応する翻訳をしてください
- 丁寧な装飾語（「興味深い」「重要な」「正直に言うと」「観測」「十分です」「誠実に」など）は容赦なく剥がす
- ただし攻撃的にはせず、自虐とユーモアで処理する
- カジュアルな日本語で。語尾は「〜だな」「〜だわ」「〜じゃん」など
- 元の文より短くてOK
- 余計な前置きや「翻訳結果：」などは書かず、訳文だけを出力`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: sys,
        messages: [{ role: "user", content: text }]
      })
    });
    const data = await res.json();
    const result = (data.content || [])
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("\n")
      .trim();
    outBody.textContent = result || "(翻訳できませんでした)";
  } catch (e) {
    out.style.display = 'none';
    err.style.display = 'block';
    err.textContent = 'エラー: ' + e.message;
  } finally {
    go.disabled = false;
  }
};
</script>
